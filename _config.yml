title: Syn Naulaid
description: Personal Page
baseurl: ""
url: "https://synnaulaid.github.io"
markdown: kramdown
permalink: /:title/
future: true

plugins:
  - jekyll-redirect-from
  - jekyll-paginate-v2

pagination:
  enabled: true
  per_page: 5
  permalink: '/blog/:num/'  # page 1 → /blog/, page 2 → /blog/2/, etc
  title: ':title - page :num'
  sort_field: 'date'
  sort_reverse: true   # terbaru di atas
  trail:
    before: 2
    after: 2