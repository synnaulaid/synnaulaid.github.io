---
layout: base
---

<article>
  <h1>{{ page.title }}</h1>
  <p style="opacity:0.6;">{{ page.date | date: "%B %d, %Y" }}</p>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4139686200972512"
     crossorigin="anonymous"></script>
  <!-- Display ads -->
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-4139686200972512"
       data-ad-slot="8206743408"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>

  <div>
    {{ content }}
  </div>

  {% if page.tags %}
    <div class="tags">
      <span class="taging"><b>Tags</b>: </span>
      {% for tag in page.tags %}
        <a href="{{ '/tags/' | append: tag | append: '/' | relative_url }}">
          #{{ tag }}
        </a>
      {% endfor %}
    </div>
  {% endif %}


</article>
